services:
  postgres:
    image: postgres:17-alpine
    container_name: baby-backend-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-baby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baby}
      POSTGRES_DB: ${POSTGRES_DB:-baby}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
